<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core Problems — Solar Panel Array Simulation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5ede6;
    font-family: 'Georgia', serif;
    color: #3a1a1a;
    min-height: 100vh;
  }

  .page-wrapper {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px 48px;
  }

  /* ── Header ── */
  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .ti-badge {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ti-logo {
    width: 32px;
    height: 32px;
  }

  .ti-text {
    font-size: 11px;
    font-weight: 700;
    color: #8b1a1a;
    letter-spacing: 1.5px;
    line-height: 1.3;
    text-transform: uppercase;
  }

  .dot-grid {
    display: grid;
    grid-template-columns: repeat(9, 6px);
    gap: 4px;
  }

  .dot-grid span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #c9a0a0;
    display: block;
  }

  .page-title {
    font-size: 52px;
    font-weight: 700;
    color: #8b1a1a;
    text-align: center;
    letter-spacing: -1px;
    margin: 8px 0 28px;
    font-style: italic;
  }

  /* ── Tab Bar ── */
  .tab-bar {
    display: flex;
    background: #eeddd4;
    border: 1px solid #d4a8a0;
    border-radius: 6px 6px 0 0;
    overflow: hidden;
  }

  .tab {
    flex: 1;
    padding: 11px 6px;
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #a06060;
    cursor: pointer;
    border-right: 1px solid #d4a8a0;
    text-align: center;
    font-family: 'Georgia', serif;
    font-weight: 700;
    transition: all 0.15s;
    line-height: 1.3;
  }

  .tab:last-child { border-right: none; }
  .tab:hover { background: #e8ccc4; color: #8b1a1a; }
  .tab.active { background: #8b1a1a; color: #f5ede6; }

  /* ── Content Panel ── */
  .sim-panel {
    background: #fdf7f3;
    border: 1px solid #d4a8a0;
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 24px 28px 28px;
  }

  .problem-badge {
    display: inline-block;
    background: #eeddd4;
    border: 1px solid #c9a0a0;
    color: #8b1a1a;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 10px;
    font-family: 'Georgia', serif;
    font-weight: 700;
  }

  .problem-desc {
    font-size: 13px;
    color: #7a4a4a;
    line-height: 1.8;
    margin-bottom: 18px;
    font-style: italic;
    border-left: 3px solid #c9a0a0;
    padding-left: 12px;
  }

  /* ── Controls ── */
  .control-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .ctrl-label {
    font-size: 11px;
    color: #8a5050;
    letter-spacing: 1px;
    text-transform: uppercase;
    min-width: 110px;
    font-family: 'Georgia', serif;
  }

  input[type=range] {
    flex: 1;
    accent-color: #8b1a1a;
    height: 4px;
  }

  .ctrl-val {
    font-size: 13px;
    color: #8b1a1a;
    min-width: 38px;
    text-align: right;
    font-weight: 700;
    font-family: 'Georgia', serif;
  }

  /* ── Stat Cards ── */
  .stat-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: #eeddd4;
    border: 1px solid #d4a8a0;
    border-radius: 4px;
    padding: 10px 16px;
    flex: 1;
    min-width: 110px;
  }

  .stat-label {
    font-size: 10px;
    color: #9a6060;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-family: 'Georgia', serif;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 700;
    color: #8b1a1a;
    font-family: 'Georgia', serif;
  }

  .stat-value.danger { color: #c94040; }
  .stat-value.safe   { color: #2e7d32; }
  .stat-value.info   { color: #1565c0; }

  .stat-unit {
    font-size: 12px;
    color: #b08080;
    margin-left: 2px;
    font-weight: 400;
  }

  /* ── Section title ── */
  .sim-section-title {
    font-size: 11px;
    color: #8b1a1a;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
    font-weight: 700;
    border-bottom: 1px solid #d4a8a0;
    padding-bottom: 5px;
    font-family: 'Georgia', serif;
  }

  /* ── Canvas ── */
  canvas {
    display: block;
    border-radius: 4px;
    border: 1px solid #d4a8a0;
    background: #fdf7f3;
    width: 100%;
  }

  /* ── Legend ── */
  .legend-row {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #8a6060;
    font-family: 'Georgia', serif;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── Warning box ── */
  .warning-box {
    background: #fbeae4;
    border-left: 3px solid #8b1a1a;
    border-radius: 2px;
    padding: 10px 14px;
    margin-top: 14px;
    font-size: 12px;
    color: #6a3030;
    line-height: 1.7;
    font-family: 'Georgia', serif;
  }

  /* ── Buttons ── */
  .action-btn {
    padding: 9px 18px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 1.5px;
    font-family: 'Georgia', serif;
    font-weight: 700;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }

  .action-btn:hover { opacity: 0.85; }

  .btn-danger {
    background: #eeddd4;
    border: 1.5px solid #8b1a1a;
    color: #8b1a1a;
  }

  .btn-safe {
    background: #e4f0e6;
    border: 1.5px solid #2e7d32;
    color: #2e7d32;
  }

  /* ── Dot grid decoration ── */
  .dots-corner {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    width: 60px;
  }

  .dots-corner span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #c9a0a0;
    display: block;
  }
</style>
</head>
<body>
<div class="page-wrapper">

  <!-- Header -->
  <div class="page-header">
    <div class="ti-badge">
      <svg class="ti-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20,2 38,38 2,38" fill="#8b1a1a"/>
        <polygon points="20,10 32,34 8,34" fill="#f5ede6"/>
        <polygon points="20,18 28,34 12,34" fill="#8b1a1a"/>
      </svg>
      <div class="ti-text">Texas<br>Instruments</div>
    </div>
    <div class="dot-grid">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <h1 class="page-title">Core Problems</h1>

  <!-- Tabs -->
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab(0)">Contamination<br>Detection</div>
    <div class="tab" onclick="switchTab(1)">Water Efficient<br>Cleaning</div>

  <div class="sim-panel" id="simContent"></div>

  <!-- Bottom dots -->
  <div style="margin-top:20px; display:flex; gap:5px">

    <span style="width:5px;height:5px;border-radius:50%;background:#c9a0a0;display:block"></span>
    <span style="width:5px;height:5px;border-radius:50%;background:#c9a0a0;display:block"></span>
  </div>

</div>

<script>
const TABS = [
  { badge: 'Problem 01 — Contamination Detection', desc: 'Dust-induced losses are masked by shading, weather, and low irradiance — making it nearly impossible to isolate the true drop from dirt alone.', render: renderContamination },
  { badge: 'Problem 02 — Water Efficient Cleaning', desc: 'Conventional cleaning methods require large volumes of water, limiting sustainability and increasing operational costs at scale.', render: renderWater },
  { badge: 'Problem 03 — Coverage & Navigation', desc: 'Large panel arrays demand reliable autonomous navigation to ensure every region is cleaned without omission.', render: renderCoverage },
  { badge: 'Problem 04 — Fault vs Dirt Diagnosis', desc: 'Reduced power output can originate from contamination, hotspots, damaged cells, or electrical faults — requiring accurate diagnosis.', render: renderFault }
];

let activeTab = 0;
let covVisited = new Set();
let covPath = [];
let covAnimId = null;
let covStep = 0;

function switchTab(i) {
  activeTab = i;
  document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
  if (covAnimId) { clearTimeout(covAnimId); covAnimId = null; }
  TABS[i].render();
}

/* ── Tab 1: Contamination ─────────────────────────────────────── */
function renderContamination() {
  document.getElementById('simContent').innerHTML = `
    <div class="problem-badge">${TABS[0].badge}</div>
    <p class="problem-desc">${TABS[0].desc}</p>
    <div class="control-row">
      <span class="ctrl-label">Dust Level</span>
      <input type="range" min="0" max="100" value="40" id="dustSlider">
      <span class="ctrl-val" id="dustVal">40%</span>
    </div>
    <div class="control-row">
      <span class="ctrl-label">Cloud Cover</span>
      <input type="range" min="0" max="100" value="20" id="cloudSlider">
      <span class="ctrl-val" id="cloudVal">20%</span>
    </div>
    <div class="stat-row" id="contStats"></div>
    <div class="sim-section-title">Panel Output Map — Contamination vs Shading</div>
    <canvas id="contCanvas" height="200"></canvas>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:#2e7d32"></div>Clean (100%)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f9a825"></div>Light dust</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e64a19"></div>Heavy dust</div>
      <div class="legend-item"><div class="legend-dot" style="background:#9e9e9e"></div>Shaded / cloud</div>
    </div>
    <div class="warning-box" id="contWarn"></div>
  `;
  document.getElementById('dustSlider').oninput = document.getElementById('cloudSlider').oninput = updateCont;
  updateCont();
}

function updateCont() {
  const dust = parseInt(document.getElementById('dustSlider').value);
  const cloud = parseInt(document.getElementById('cloudSlider').value);
  document.getElementById('dustVal').textContent = dust + '%';
  document.getElementById('cloudVal').textContent = cloud + '%';
  const dustLoss = dust * 0.48;
  const cloudLoss = cloud * 0.35;
  const actual = Math.max(0, 100 - dustLoss - cloudLoss).toFixed(1);
  const visible = Math.max(0, 100 - cloudLoss).toFixed(1);
  const masked = Math.max(0, parseFloat(visible) - parseFloat(actual)).toFixed(1);
  document.getElementById('contStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Actual Output</div><div class="stat-value">${actual}<span class="stat-unit">%</span></div></div>
    <div class="stat-card"><div class="stat-label">Sensor-Visible Drop</div><div class="stat-value">${visible}<span class="stat-unit">%</span></div></div>
    <div class="stat-card"><div class="stat-label">Masked Loss</div><div class="stat-value danger">${masked}<span class="stat-unit">%</span></div></div>
  `;
  drawContGrid(dust, cloud);
  document.getElementById('contWarn').innerHTML = parseFloat(masked) > 5
    ? `⚠ <strong>${masked}%</strong> of power loss is hidden by cloud cover — contamination is undetectable from output readings alone without dedicated sensing.`
    : `✓ Low masking at current cloud levels. Dust loss is relatively isolatable from sensor data.`;
}

function drawContGrid(dust, cloud) {
  const canvas = document.getElementById('contCanvas');
  if (!canvas) return;
  const W = canvas.parentElement.clientWidth - 56;
  canvas.width = W; canvas.height = 200;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fdf7f3'; ctx.fillRect(0, 0, W, 200);
  const cols = 12, rows = 4, pw = Math.floor((W - 20) / cols - 4), ph = 42, gap = 4;
  const sx = 10, sy = 10;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = sx + c * (pw + gap), y = sy + r * (ph + gap);
      const rnd = (Math.sin(r * 13 + c * 7) * 0.5 + 0.5);
      const ld = Math.max(0, Math.min(1, dust / 100 + (rnd - 0.5) * 0.5));
      const shaded = rnd > 0.85 || (r === 1 && c > 8) || cloud > 60;
      let fill;
      if (shaded) fill = '#bdbdbd';
      else if (ld > 0.7) fill = `rgb(${Math.floor(200 + ld * 30)},${Math.floor(80 - ld * 30)},30)`;
      else if (ld > 0.3) fill = `rgb(220,${Math.floor(160 - ld * 80)},40)`;
      else fill = `rgb(46,${Math.floor(125 + (1 - ld) * 55)},50)`;
      ctx.fillStyle = fill;
      ctx.beginPath(); ctx.roundRect(x, y, pw, ph, 3); ctx.fill();
      if (ld > 0.2 && !shaded) {
        ctx.fillStyle = 'rgba(140,100,40,0.22)';
        for (let s = 0; s < Math.floor(ld * 7); s++) {
          const sx2 = x + Math.sin(s * 97 + r * 31 + c) * pw * 0.38 + pw / 2;
          const sy2 = y + Math.cos(s * 53 + r * 19 + c) * ph * 0.38 + ph / 2;
          ctx.beginPath(); ctx.arc(sx2, sy2, 1.8, 0, Math.PI * 2); ctx.fill();
        }
      }
    }
  }
}

/* ── Tab 2: Water ─────────────────────────────────────────────── */
function renderWater() {
  document.getElementById('simContent').innerHTML = `
    <div class="problem-badge">${TABS[1].badge}</div>
    <p class="problem-desc">${TABS[1].desc}</p>
    <div class="control-row">
      <span class="ctrl-label">Panel Count</span>
      <input type="range" min="10" max="500" value="100" step="10" id="panelCount">
      <span class="ctrl-val" id="panelCountVal">100</span>
    </div>
    <div class="control-row">
      <span class="ctrl-label">Cleanings / Month</span>
      <input type="range" min="1" max="8" value="2" id="cleanFreq">
      <span class="ctrl-val" id="cleanFreqVal">2</span>
    </div>
    <div class="stat-row" id="waterStats"></div>
    <div class="sim-section-title">Conventional vs Dry-Clean Water Usage (6 months)</div>
    <canvas id="waterCanvas" height="200"></canvas>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:#8b1a1a"></div>Conventional (25 L/panel)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1565c0"></div>Dry-clean robot (0.5 L/panel)</div>
    </div>
    <div class="warning-box" id="waterWarn"></div>
  `;
  document.getElementById('panelCount').oninput = document.getElementById('cleanFreq').oninput = updateWater;
  updateWater();
}

function updateWater() {
  const panels = parseInt(document.getElementById('panelCount').value);
  const freq = parseInt(document.getElementById('cleanFreq').value);
  document.getElementById('panelCountVal').textContent = panels;
  document.getElementById('cleanFreqVal').textContent = freq;
  const conv = panels * 25 * freq;
  const robot = panels * 0.5 * freq;
  const saving = ((conv - robot) / conv * 100).toFixed(0);
  document.getElementById('waterStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Conventional / month</div><div class="stat-value danger">${(conv / 1000).toFixed(1)}<span class="stat-unit">kL</span></div></div>
    <div class="stat-card"><div class="stat-label">Robot / month</div><div class="stat-value info">${robot.toFixed(0)}<span class="stat-unit">L</span></div></div>
    <div class="stat-card"><div class="stat-label">Water Saved</div><div class="stat-value safe">${saving}<span class="stat-unit">%</span></div></div>
  `;
  drawWaterBars(conv, robot);
  document.getElementById('waterWarn').innerHTML = `⚠ At <strong>${panels} panels</strong> cleaned <strong>${freq}×/month</strong>, conventional methods consume <strong>${(conv / 1000).toFixed(1)} kilolitres</strong> monthly — highly unsustainable in water-scarce regions.`;
}

function drawWaterBars(conv, robot) {
  const canvas = document.getElementById('waterCanvas');
  if (!canvas) return;
  const W = canvas.parentElement.clientWidth - 56;
  canvas.width = W; canvas.height = 200;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fdf7f3'; ctx.fillRect(0, 0, W, 200);
  const months = 6, barW = Math.floor((W - 80) / months / 2 - 4);
  const gap = 6, groupGap = 16, baseY = 175, maxH = 130;
  const startX = 50;
  ctx.strokeStyle = '#e0ccc4'; ctx.lineWidth = 0.5;
  ctx.fillStyle = '#b08080'; ctx.font = '10px Georgia'; ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const y = baseY - maxH * i / 4;
    ctx.beginPath(); ctx.moveTo(40, y); ctx.lineTo(W - 10, y); ctx.stroke();
    ctx.fillText(Math.round(conv * i / 4 / 1000) + 'k', 36, y + 4);
  }
  for (let m = 0; m < months; m++) {
    const f = 0.85 + Math.sin(m * 1.2) * 0.15;
    const cH = Math.max(3, (conv * f / conv) * maxH);
    const rH = Math.max(3, (robot * f / conv) * maxH);
    const gx = startX + m * (barW * 2 + gap + groupGap);
    ctx.fillStyle = '#8b1a1a';
    ctx.beginPath(); ctx.roundRect(gx, baseY - cH, barW, cH, [3, 3, 0, 0]); ctx.fill();
    ctx.fillStyle = '#1565c0';
    ctx.beginPath(); ctx.roundRect(gx + barW + gap, baseY - rH, barW, rH, [3, 3, 0, 0]); ctx.fill();
    ctx.fillStyle = '#9a6060'; ctx.font = '10px Georgia'; ctx.textAlign = 'center';
    ctx.fillText('M' + (m + 1), gx + barW + gap / 2, baseY + 14);
  }
}

/* ── Tab 3: Coverage ──────────────────────────────────────────── */
function renderCoverage() {
  covVisited = new Set(); covPath = []; covStep = 0;
  if (covAnimId) { clearTimeout(covAnimId); covAnimId = null; }
  document.getElementById('simContent').innerHTML = `
    <div class="problem-badge">${TABS[2].badge}</div>
    <p class="problem-desc">${TABS[2].desc}</p>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-label">Coverage</div><div class="stat-value" id="covPct">0<span class="stat-unit">%</span></div></div>
      <div class="stat-card"><div class="stat-label">Missed Panels</div><div class="stat-value danger" id="covMissed">50</div></div>
      <div class="stat-card"><div class="stat-label">Path Strategy</div><div class="stat-value" id="covPath" style="font-size:14px">—</div></div>
    </div>
    <div class="sim-section-title">Grid Navigation Simulation</div>
    <canvas id="covCanvas" height="260"></canvas>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:#8b1a1a"></div>Robot position</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2e7d32"></div>Cleaned</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ddd0c8"></div>Uncleaned</div>
    </div>
    <div class="warning-box">⚠ Without systematic path planning, the robot may skip rows or drift — leaving contaminated panels that silently reduce array output.</div>
    <div style="display:flex; gap:10px; margin-top:16px">
      <button class="action-btn btn-danger" onclick="startCovSim(false)">▶ Naive Path</button>
      <button class="action-btn btn-safe" onclick="startCovSim(true)">▶ Smart Path (Boustrophedon)</button>
    </div>
  `;
  drawCovGrid(-1, -1);
}

function startCovSim(smart) {
  if (covAnimId) { clearTimeout(covAnimId); covAnimId = null; }
  covVisited = new Set(); covStep = 0;
  document.getElementById('covPath').textContent = smart ? 'Boustrophedon' : 'Random / naive';
  const cols = 10, rows = 5;
  covPath = [];
  if (smart) {
    for (let r = 0; r < rows; r++) {
      if (r % 2 === 0) for (let c = 0; c < cols; c++) covPath.push([r, c]);
      else for (let c = cols - 1; c >= 0; c--) covPath.push([r, c]);
    }
  } else {
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (Math.random() > 0.18) covPath.push([r, c]);
        if (Math.random() < 0.07) c += 1;
      }
    }
  }
  function step() {
    if (covStep < covPath.length) {
      covVisited.add(covPath[covStep][0] * 100 + covPath[covStep][1]);
      drawCovGrid(covPath[covStep][0], covPath[covStep][1]);
      covStep++;
      covAnimId = setTimeout(step, 90);
    } else { drawCovGrid(-1, -1); }
  }
  step();
}

function drawCovGrid(robotR, robotC) {
  const canvas = document.getElementById('covCanvas');
  if (!canvas) return;
  const W = canvas.parentElement.clientWidth - 56;
  canvas.width = W; canvas.height = 260;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fdf7f3'; ctx.fillRect(0, 0, W, 260);
  const cols = 10, rows = 5;
  const pw = Math.floor((W - 20) / cols - 5), ph = 44, gap = 5, sx = 10, sy = 10;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = sx + c * (pw + gap), y = sy + r * (ph + gap);
      const visited = covVisited.has(r * 100 + c);
      const isRobot = r === robotR && c === robotC;
      ctx.fillStyle = isRobot ? '#8b1a1a' : visited ? '#c8e6c9' : '#e8dcd6';
      ctx.beginPath(); ctx.roundRect(x, y, pw, ph, 3); ctx.fill();
      ctx.strokeStyle = isRobot ? '#5a0a0a' : visited ? '#4caf50' : '#c9b8b0';
      ctx.lineWidth = 0.8; ctx.stroke();
      if (visited && !isRobot) {
        ctx.fillStyle = '#2e7d32'; ctx.font = '12px Georgia'; ctx.textAlign = 'center';
        ctx.fillText('✓', x + pw / 2, y + ph / 2 + 5);
      }
    }
  }
  const total = 50;
  const pct = Math.round(covVisited.size / total * 100);
  const el1 = document.getElementById('covPct');
  const el2 = document.getElementById('covMissed');
  if (el1) el1.innerHTML = pct + '<span class="stat-unit">%</span>';
  if (el2) el2.textContent = total - covVisited.size;
}

/* ── Tab 4: Fault vs Dirt ─────────────────────────────────────── */
function renderFault() {
  document.getElementById('simContent').innerHTML = `
    <div class="problem-badge">${TABS[3].badge}</div>
    <p class="problem-desc">${TABS[3].desc}</p>
    <div class="sim-section-title">Thermal & Electrical Diagnostic Map</div>
    <canvas id="faultCanvas" height="220"></canvas>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:#2e7d32"></div>Nominal</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f9a825"></div>Dirty (uniform loss)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e64a19"></div>Hotspot (localised heat)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8b1a1a"></div>Cell damage / fault</div>
    </div>
    <div class="stat-row" style="margin-top:14px" id="faultStats"></div>
    <div class="warning-box">⚠ Both dirt and electrical faults reduce output by 15–30%. Without thermal or IV-curve diagnosis, cleaning the wrong panels wastes time while faults remain undetected and worsen over time.</div>
  `;
  drawFaultGrid();
}

function drawFaultGrid() {
  const canvas = document.getElementById('faultCanvas');
  if (!canvas) return;
  const W = canvas.parentElement.clientWidth - 56;
  canvas.width = W; canvas.height = 220;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fdf7f3'; ctx.fillRect(0, 0, W, 220);
  const cols = 11, rows = 4;
  const pw = Math.floor((W - 20) / cols - 5), ph = 44, gap = 5, sx = 10, sy = 10;
  const counts = { nominal: 0, dirty: 0, hotspot: 0, fault: 0 };
  const forced = { '1-3': 'hotspot', '2-7': 'hotspot', '0-8': 'fault', '3-2': 'fault' };
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = sx + c * (pw + gap), y = sy + r * (ph + gap);
      const key = `${r}-${c}`;
      const seed = (Math.sin(r * 17 + c * 31 + 42) * 100 + 100) % 1;
      let type = forced[key] || (seed < 0.32 ? 'dirty' : 'nominal');
      counts[type]++;
      let fill, stroke;
      if (type === 'hotspot')    { fill = '#ffccbc'; stroke = '#e64a19'; }
      else if (type === 'fault') { fill = '#f5c6c6'; stroke = '#8b1a1a'; }
      else if (type === 'dirty') { fill = '#fff9c4'; stroke = '#f9a825'; }
      else                       { fill = '#c8e6c9'; stroke = '#4caf50'; }
      ctx.fillStyle = fill;
      ctx.beginPath(); ctx.roundRect(x, y, pw, ph, 3); ctx.fill();
      ctx.strokeStyle = stroke; ctx.lineWidth = type === 'nominal' ? 0.8 : 1.5; ctx.stroke();
      if (type === 'hotspot') {
        ctx.fillStyle = '#bf360c'; ctx.font = '13px Georgia'; ctx.textAlign = 'center';
        ctx.fillText('🌡', x + pw / 2, y + ph / 2 + 5);
      }
      if (type === 'fault') {
        ctx.fillStyle = '#7b0000'; ctx.font = '13px Georgia'; ctx.textAlign = 'center';
        ctx.fillText('⚡', x + pw / 2, y + ph / 2 + 5);
      }
      if (type === 'dirty') {
        ctx.fillStyle = 'rgba(120,90,10,0.2)';
        for (let s = 0; s < 4; s++) {
          ctx.beginPath(); ctx.arc(x + 10 + s * 9, y + 14 + (s % 2) * 6, 3, 0, Math.PI * 2); ctx.fill();
        }
      }
    }
  }
  document.getElementById('faultStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Nominal</div><div class="stat-value safe">${counts.nominal}</div></div>
    <div class="stat-card"><div class="stat-label">Dirty</div><div class="stat-value" style="color:#f9a825">${counts.dirty}</div></div>
    <div class="stat-card"><div class="stat-label">Hotspots</div><div class="stat-value" style="color:#e64a19">${counts.hotspot}</div></div>
    <div class="stat-card"><div class="stat-label">Faults</div><div class="stat-value danger">${counts.fault}</div></div>
  `;
}

switchTab(0);
</script>
